<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wasm Project</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      h1 {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      p.subtitle {
        color: #94a3b8;
        margin-bottom: 3rem;
        font-size: 1.1rem;
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 2rem;
        max-width: 800px;
        width: 100%;
      }
      a.card {
        display: block;
        text-decoration: none;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 1rem;
        padding: 2rem;
        transition:
          transform 0.2s,
          border-color 0.2s;
      }
      a.card:hover {
        transform: translateY(-4px);
        border-color: #60a5fa;
      }
      .card h2 {
        font-size: 1.4rem;
        color: #f1f5f9;
        margin-bottom: 0.75rem;
      }
      .card .tech {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }
      .card .tech span {
        background: #334155;
        color: #94a3b8;
        padding: 0.2rem 0.6rem;
        border-radius: 0.375rem;
        font-size: 0.8rem;
      }
      .card p {
        color: #94a3b8;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <h1>Wasm Project</h1>
    <p class="subtitle">
      WebAssemblyを調査・実装してみたプロジェクトの成果物です。
    </p>
    <div class="cards">
      <a class="card" href="./image-filter/">
        <h2>Image Filter</h2>
        <p>
          画像フィルター処理で JS と WASM
          のパフォーマンスを比較。グレースケール、ブラー、シャープなど複数のフィルターを実装。
        </p>
      </a>
      <a class="card" href="./diff-tool/">
        <h2>Diff Tool</h2>
        <p>
          テキストの差分を比較するツール。Rust で書かれた WASM
          モジュールを使い、ブラウザ上で高速に差分計算を実行。
        </p>
      </a>
    </div>
  </body>
</html>
